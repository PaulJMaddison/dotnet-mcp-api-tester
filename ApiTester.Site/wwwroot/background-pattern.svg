<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="ApiTester app shell background pattern">
  <defs>
    <linearGradient id="bgTone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <pattern id="shellGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#1f2937" stroke-width="1" opacity="0.6" />
      <circle cx="8" cy="8" r="2" fill="#334155" />
      <circle cx="72" cy="72" r="2" fill="#334155" />
    </pattern>
    <linearGradient id="shellStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1" />
      <stop offset="1" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgTone)" />
  <rect width="1600" height="900" fill="url(#shellGrid)" />
  <path d="M120 720C360 520 620 520 860 720" fill="none" stroke="url(#shellStroke)" stroke-width="4" opacity="0.45" />
  <path d="M720 160C920 340 1180 340 1400 160" fill="none" stroke="url(#shellStroke)" stroke-width="4" opacity="0.35" />
  <circle cx="1240" cy="680" r="180" fill="#0f172a" opacity="0.25" />
  <circle cx="260" cy="220" r="120" fill="#1e293b" opacity="0.2" />
</svg>
