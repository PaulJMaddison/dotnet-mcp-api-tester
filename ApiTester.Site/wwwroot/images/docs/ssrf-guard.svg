<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200">
  <rect width="720" height="200" fill="#f8fafc"/>
  <text x="24" y="32" font-family="Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="600">SSRF guard</text>

  <rect x="32" y="70" width="160" height="80" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="112" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0f172a">Request</text>
  <text x="112" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">URL check</text>

  <rect x="260" y="70" width="200" height="80" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="360" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0f172a">SSRF Guard</text>
  <text x="360" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Allowlist + IP rules</text>

  <rect x="528" y="40" width="160" height="60" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="608" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0f172a">Safe target</text>

  <rect x="528" y="120" width="160" height="60" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="608" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0f172a">Blocked</text>

  <line x1="192" y1="110" x2="260" y2="110" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="88" x2="528" y2="70" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="132" x2="528" y2="150" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
