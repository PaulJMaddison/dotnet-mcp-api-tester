<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <style>
      .title { font: 600 20px 'Inter', 'Segoe UI', sans-serif; fill: #0f172a; }
      .label { font: 500 14px 'Inter', 'Segoe UI', sans-serif; fill: #0f172a; }
      .small { font: 400 12px 'Inter', 'Segoe UI', sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>
  <rect width="960" height="420" fill="#f8fafc" rx="18" />
  <text x="40" y="46" class="title">Dotnet MCP API Tester Architecture</text>

  <rect x="60" y="90" width="250" height="110" rx="16" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="185" y="130" text-anchor="middle" class="label">ApiTester.Ui</text>
  <text x="185" y="155" text-anchor="middle" class="small">Razor Pages UI</text>
  <text x="185" y="175" text-anchor="middle" class="small">Human-driven workflows</text>

  <rect x="355" y="90" width="250" height="110" rx="16" fill="#dbeafe" stroke="#60a5fa" />
  <text x="480" y="130" text-anchor="middle" class="label">ApiTester.Web</text>
  <text x="480" y="155" text-anchor="middle" class="small">REST API + Swagger UI</text>
  <text x="480" y="175" text-anchor="middle" class="small">Project + run orchestration</text>

  <rect x="650" y="90" width="250" height="110" rx="16" fill="#ecfccb" stroke="#84cc16" />
  <text x="775" y="130" text-anchor="middle" class="label">ApiTester.McpServer</text>
  <text x="775" y="155" text-anchor="middle" class="small">Persistence layer</text>
  <text x="775" y="175" text-anchor="middle" class="small">File / SQL providers</text>

  <line x1="310" y1="145" x2="355" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="605" y1="145" x2="650" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="160" y="250" width="640" height="120" rx="18" fill="#fff7ed" stroke="#fb923c" />
  <text x="480" y="285" text-anchor="middle" class="label">Persistence Configuration</text>
  <text x="480" y="310" text-anchor="middle" class="small">File storage (JSON in MCP_WORKDIR) or SQL via EF Core</text>
  <text x="480" y="332" text-anchor="middle" class="small">Configured in ApiTester.Web startup settings</text>

  <line x1="480" y1="200" x2="480" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
</svg>
