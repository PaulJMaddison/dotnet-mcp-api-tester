<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Security pipeline diagram</title>
  <desc id="desc">Flow diagram showing intake, policy validation, runtime scanning, and incident response nodes connected by arrows.</desc>
  <rect width="720" height="420" fill="#f8fafc" />
  <g font-family="'Segoe UI', sans-serif">
    <g transform="translate(48 96)">
      <rect width="150" height="80" rx="18" fill="#ffffff" stroke="#cbd5f5" />
      <text x="75" y="44" text-anchor="middle" font-size="14" fill="#1e293b">Spec intake</text>
      <text x="75" y="64" text-anchor="middle" font-size="12" fill="#64748b">OpenAPI + GraphQL</text>
    </g>
    <g transform="translate(248 96)">
      <rect width="150" height="80" rx="18" fill="#ffffff" stroke="#cbd5f5" />
      <text x="75" y="44" text-anchor="middle" font-size="14" fill="#1e293b">Policy checks</text>
      <text x="75" y="64" text-anchor="middle" font-size="12" fill="#64748b">PII + auth rules</text>
    </g>
    <g transform="translate(448 96)">
      <rect width="150" height="80" rx="18" fill="#ffffff" stroke="#cbd5f5" />
      <text x="75" y="44" text-anchor="middle" font-size="14" fill="#1e293b">Runtime scans</text>
      <text x="75" y="64" text-anchor="middle" font-size="12" fill="#64748b">Threat telemetry</text>
    </g>
    <g transform="translate(248 250)">
      <rect width="150" height="80" rx="18" fill="#ffffff" stroke="#cbd5f5" />
      <text x="75" y="44" text-anchor="middle" font-size="14" fill="#1e293b">Incident response</text>
      <text x="75" y="64" text-anchor="middle" font-size="12" fill="#64748b">Runbooks + alerts</text>
    </g>
  </g>
  <g stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M198 136h50" />
    <path d="M398 136h50" />
    <path d="M498 176v40c0 20-20 34-40 34H323" />
    <path d="M323 250c-15 0-30-12-30-26v-12" />
  </g>
  <g fill="#94a3b8">
    <polygon points="246,136 236,130 236,142" />
    <polygon points="446,136 436,130 436,142" />
    <polygon points="323,250 333,244 333,256" />
  </g>
</svg>
