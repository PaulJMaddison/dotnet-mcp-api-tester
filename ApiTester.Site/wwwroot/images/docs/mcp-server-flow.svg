<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <style>
      .title { font: 600 20px 'Inter', 'Segoe UI', sans-serif; fill: #0f172a; }
      .label { font: 500 14px 'Inter', 'Segoe UI', sans-serif; fill: #0f172a; }
      .small { font: 400 12px 'Inter', 'Segoe UI', sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>
  <rect width="960" height="420" fill="#f8fafc" rx="18" />
  <text x="40" y="46" class="title">MCP Server Flow</text>

  <rect x="60" y="90" width="200" height="90" rx="16" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="160" y="130" text-anchor="middle" class="label">AI Client</text>
  <text x="160" y="152" text-anchor="middle" class="small">ChatGPT / Claude</text>

  <rect x="300" y="90" width="200" height="90" rx="16" fill="#dbeafe" stroke="#60a5fa" />
  <text x="400" y="130" text-anchor="middle" class="label">MCP Tools</text>
  <text x="400" y="152" text-anchor="middle" class="small">Deterministic calls</text>

  <rect x="540" y="90" width="200" height="90" rx="16" fill="#ecfccb" stroke="#84cc16" />
  <text x="640" y="130" text-anchor="middle" class="label">Spec Parser</text>
  <text x="640" y="152" text-anchor="middle" class="small">OpenAPI validation</text>

  <rect x="780" y="90" width="140" height="90" rx="16" fill="#fff7ed" stroke="#fb923c" />
  <text x="850" y="130" text-anchor="middle" class="label">HTTP</text>
  <text x="850" y="152" text-anchor="middle" class="small">Allowlisted</text>

  <line x1="260" y1="135" x2="300" y2="135" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="500" y1="135" x2="540" y2="135" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="740" y1="135" x2="780" y2="135" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="160" y="250" width="640" height="120" rx="18" fill="#f1f5f9" stroke="#94a3b8" />
  <text x="480" y="285" text-anchor="middle" class="label">Safety Guardrails</text>
  <text x="480" y="308" text-anchor="middle" class="small">Host allowlist · Verb restrictions · Redaction</text>
  <text x="480" y="330" text-anchor="middle" class="small">Timeouts · Response size limits</text>

  <line x1="640" y1="180" x2="640" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
</svg>
