<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="AI MCP pipeline">
  <defs>
    <linearGradient id="pipeline-bg" x1="90" y1="20" x2="1110" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f9fbff"/>
    </linearGradient>
    <linearGradient id="pipeline-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="pipeline-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#8aa2d3" flood-opacity="0.28"/>
    </filter>
    <style>
      .card { fill:#fff; stroke:#ced9ec; stroke-width:2; }
      .title { font: 700 30px Inter, system-ui, -apple-system, Segoe UI, sans-serif; fill:#102648; }
      .lead { font: 500 18px Inter, system-ui, -apple-system, Segoe UI, sans-serif; fill:#38567a; }
      .h { font: 700 22px Inter, system-ui, -apple-system, Segoe UI, sans-serif; fill:#163660; }
      .t { font: 500 16px Inter, system-ui, -apple-system, Segoe UI, sans-serif; fill:#4d6788; }
      .tag { font: 700 12px Inter, system-ui, -apple-system, Segoe UI, sans-serif; fill:#fff; letter-spacing:.55px; }
      .arrow { stroke:#3f6fba; stroke-width:4; fill:none; stroke-linecap:round; }
    </style>
  </defs>

  <rect width="1200" height="700" rx="32" fill="url(#pipeline-bg)"/>
  <text x="78" y="106" class="title">Spec → Plan → Run → Evidence → Eval</text>
  <text x="78" y="140" class="lead">MCP tools orchestrate deterministic test workflows while AI summarizes outcomes with traceable citations.</text>

  <g filter="url(#pipeline-shadow)">
    <rect class="card" x="78" y="196" width="228" height="186" rx="18"/>
    <rect class="card" x="364" y="196" width="228" height="186" rx="18"/>
    <rect class="card" x="650" y="196" width="228" height="186" rx="18"/>
    <rect class="card" x="936" y="196" width="186" height="186" rx="18"/>
    <rect class="card" x="364" y="450" width="322" height="170" rx="18"/>
    <rect class="card" x="742" y="450" width="380" height="170" rx="18"/>
  </g>

  <g>
    <rect x="98" y="216" width="74" height="24" rx="12" fill="url(#pipeline-accent)"/>
    <text x="116" y="232" class="tag">INPUT</text>
    <text x="98" y="276" class="h">OpenAPI spec</text>
    <text x="98" y="304" class="t">URL/file import</text>
    <text x="98" y="328" class="t">SSRF and size controls</text>
  </g>

  <g>
    <rect x="384" y="216" width="74" height="24" rx="12" fill="url(#pipeline-accent)"/>
    <text x="401" y="232" class="tag">TOOLS</text>
    <text x="384" y="276" class="h">Test planning</text>
    <text x="384" y="304" class="t">Scenario graph builder</text>
    <text x="384" y="328" class="t">Edge-case expansion</text>
  </g>

  <g>
    <rect x="670" y="216" width="102" height="24" rx="12" fill="url(#pipeline-accent)"/>
    <text x="687" y="232" class="tag">EXECUTION</text>
    <text x="670" y="276" class="h">Run engine</text>
    <text x="670" y="304" class="t">Latency + status trace</text>
    <text x="670" y="328" class="t">Payload redaction aware</text>
  </g>

  <g>
    <rect x="956" y="216" width="84" height="24" rx="12" fill="url(#pipeline-accent)"/>
    <text x="981" y="232" class="tag">EVIDENCE</text>
    <text x="956" y="276" class="h">Artifacts</text>
    <text x="956" y="304" class="t">Audit bundle</text>
    <text x="956" y="328" class="t">Diff history</text>
  </g>

  <g>
    <rect x="384" y="470" width="58" height="24" rx="12" fill="url(#pipeline-accent)"/>
    <text x="401" y="486" class="tag">AI</text>
    <text x="384" y="530" class="h">RAG analysis</text>
    <text x="384" y="556" class="t">Answers grounded in run evidence</text>
    <text x="384" y="580" class="t">Citation links for every claim</text>
  </g>

  <g>
    <rect x="762" y="470" width="70" height="24" rx="12" fill="url(#pipeline-accent)"/>
    <text x="780" y="486" class="tag">EVAL</text>
    <text x="762" y="530" class="h">Continuous scoring</text>
    <text x="762" y="556" class="t">Store Markdown scorecards and trends</text>
    <text x="762" y="580" class="t">Track reliability drift over time</text>
  </g>

  <path class="arrow" d="M306 290H364"/>
  <path class="arrow" d="M592 290H650"/>
  <path class="arrow" d="M878 290H936"/>
  <path class="arrow" d="M245 396C300 470 340 520 364 520"/>
  <path class="arrow" d="M686 520H742"/>

  <path d="M356 516l10 4-7 8" fill="none" stroke="#3f6fba" stroke-width="4" stroke-linecap="round"/>
  <path d="M734 516l10 4-7 8" fill="none" stroke="#3f6fba" stroke-width="4" stroke-linecap="round"/>
</svg>
