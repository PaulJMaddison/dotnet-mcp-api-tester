<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Compliance evidence workflow">
  <defs>
    <linearGradient id="compliance-bg" x1="90" y1="0" x2="1080" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1222"/>
      <stop offset="1" stop-color="#1a1f34"/>
    </linearGradient>
    <linearGradient id="compliance-chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <style>
      .panel { fill:#141c32; stroke:#3d4f77; stroke-width:2; }
      .title { font: 700 22px Inter, system-ui, -apple-system, Segoe UI, sans-serif; fill:#eef2ff; }
      .text { font: 500 16px Inter, system-ui, -apple-system, Segoe UI, sans-serif; fill:#c4d1ee; }
      .small { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill:#e8f3ff; letter-spacing:.45px; }
    </style>
  </defs>

  <rect width="1200" height="560" rx="30" fill="url(#compliance-bg)"/>
  <rect x="54" y="54" width="1092" height="452" rx="24" fill="#10172b" stroke="#2e3f62"/>

  <text x="96" y="116" class="title">Compliance evidence pipeline</text>
  <text x="96" y="146" class="text">Capture execution artifacts, apply policy labels, route for approval, then archive immutably.</text>

  <g>
    <rect x="92" y="208" width="232" height="220" rx="18" class="panel"/>
    <rect x="112" y="230" width="92" height="26" rx="13" fill="url(#compliance-chip)"/>
    <text x="128" y="248" class="small">CAPTURE</text>
    <text x="112" y="292" class="title">Collect</text>
    <text x="112" y="322" class="text">HTTP traces, logs, and</text>
    <text x="112" y="346" class="text">assertion outcomes.</text>
    <circle cx="282" cy="384" r="20" fill="#0f203f" stroke="#4a6499" stroke-width="2"/>
    <path d="M272 384h20M282 374v20" stroke="#8fd3ff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="356" y="208" width="232" height="220" rx="18" class="panel"/>
    <rect x="376" y="230" width="108" height="26" rx="13" fill="url(#compliance-chip)"/>
    <text x="392" y="248" class="small">NORMALIZE</text>
    <text x="376" y="292" class="title">Classify</text>
    <text x="376" y="322" class="text">Map to controls and</text>
    <text x="376" y="346" class="text">mask sensitive fields.</text>
    <rect x="526" y="370" width="42" height="28" rx="8" fill="#0f203f" stroke="#4a6499" stroke-width="2"/>
    <path d="M537 384h20" stroke="#8fd3ff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="620" y="208" width="232" height="220" rx="18" class="panel"/>
    <rect x="640" y="230" width="92" height="26" rx="13" fill="url(#compliance-chip)"/>
    <text x="658" y="248" class="small">APPROVE</text>
    <text x="640" y="292" class="title">Review</text>
    <text x="640" y="322" class="text">Route to security and</text>
    <text x="640" y="346" class="text">release stakeholders.</text>
    <circle cx="804" cy="384" r="20" fill="#0f203f" stroke="#4a6499" stroke-width="2"/>
    <path d="M794 384l8 8 12-14" stroke="#8fd3ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g>
    <rect x="884" y="208" width="232" height="220" rx="18" class="panel"/>
    <rect x="904" y="230" width="86" height="26" rx="13" fill="url(#compliance-chip)"/>
    <text x="923" y="248" class="small">ARCHIVE</text>
    <text x="904" y="292" class="title">Preserve</text>
    <text x="904" y="322" class="text">Store immutable audit</text>
    <text x="904" y="346" class="text">records with lineage.</text>
    <rect x="1048" y="368" width="46" height="32" rx="8" fill="#0f203f" stroke="#4a6499" stroke-width="2"/>
    <path d="M1058 384h26" stroke="#8fd3ff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <path d="M324 318h32" stroke="#6f8dc8" stroke-width="6" stroke-linecap="round"/>
  <path d="M588 318h32" stroke="#6f8dc8" stroke-width="6" stroke-linecap="round"/>
  <path d="M852 318h32" stroke="#6f8dc8" stroke-width="6" stroke-linecap="round"/>

  <circle cx="340" cy="318" r="5" fill="#b7d8ff"/>
  <circle cx="604" cy="318" r="5" fill="#b7d8ff"/>
  <circle cx="868" cy="318" r="5" fill="#b7d8ff"/>
</svg>
