<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Developer to QA validation workflow">
  <defs>
    <linearGradient id="workflow-bg" x1="120" y1="30" x2="1080" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1327"/>
      <stop offset="1" stop-color="#121f3d"/>
    </linearGradient>
    <linearGradient id="workflow-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="workflow-shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#050a1a" flood-opacity="0.35"/>
    </filter>
    <style>
      .card { fill:#101b35; stroke:#33456f; stroke-width:2; }
      .heading { font: 700 22px Inter, system-ui, -apple-system, Segoe UI, sans-serif; fill:#ecf2ff; }
      .sub { font: 500 16px Inter, system-ui, -apple-system, Segoe UI, sans-serif; fill:#b8c7ea; }
      .mono { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill:#7dd3fc; letter-spacing:.4px; }
    </style>
  </defs>

  <rect width="1200" height="560" rx="30" fill="url(#workflow-bg)"/>
  <rect x="48" y="48" width="1104" height="464" rx="24" fill="#0d1830" stroke="#2b3f67"/>

  <text x="88" y="112" class="heading">Professional API release pipeline</text>
  <text x="88" y="142" class="sub">Spec changes move through generation, execution, and compliance checks before merge.</text>

  <g filter="url(#workflow-shadow)">
    <rect x="82" y="192" width="242" height="238" rx="20" class="card"/>
    <rect x="362" y="192" width="242" height="238" rx="20" class="card"/>
    <rect x="642" y="192" width="242" height="238" rx="20" class="card"/>
    <rect x="922" y="192" width="196" height="238" rx="20" class="card"/>
  </g>

  <g>
    <rect x="102" y="224" width="74" height="26" rx="13" fill="url(#workflow-accent)"/>
    <text x="117" y="242" class="mono">STEP 01</text>
    <text x="102" y="286" class="heading">Define</text>
    <text x="102" y="316" class="sub">OpenAPI intent</text>
    <text x="102" y="342" class="sub">Policy coverage</text>
    <path d="M102 374H286" stroke="#2e4678" stroke-width="2"/>
    <text x="102" y="398" class="sub">Owner review required</text>
  </g>

  <g>
    <rect x="382" y="224" width="74" height="26" rx="13" fill="url(#workflow-accent)"/>
    <text x="397" y="242" class="mono">STEP 02</text>
    <text x="382" y="286" class="heading">Generate</text>
    <text x="382" y="316" class="sub">Test matrix + edge cases</text>
    <text x="382" y="342" class="sub">Synthetic payload sets</text>
    <path d="M382 374H566" stroke="#2e4678" stroke-width="2"/>
    <text x="382" y="398" class="sub">AI hints with human edit</text>
  </g>

  <g>
    <rect x="662" y="224" width="74" height="26" rx="13" fill="url(#workflow-accent)"/>
    <text x="677" y="242" class="mono">STEP 03</text>
    <text x="662" y="286" class="heading">Run</text>
    <text x="662" y="316" class="sub">Parallel environment checks</text>
    <text x="662" y="342" class="sub">Latency + assertion traces</text>
    <path d="M662 374H846" stroke="#2e4678" stroke-width="2"/>
    <text x="662" y="398" class="sub">Flake signal captured</text>
  </g>

  <g>
    <rect x="944" y="224" width="74" height="26" rx="13" fill="url(#workflow-accent)"/>
    <text x="959" y="242" class="mono">STEP 04</text>
    <text x="944" y="286" class="heading">Review</text>
    <text x="944" y="316" class="sub">Evidence bundle</text>
    <text x="944" y="342" class="sub">Ready for sign-off</text>
    <circle cx="1018" cy="390" r="20" fill="#102141" stroke="#425b8f" stroke-width="2"/>
    <path d="M1008 390l8 8 14-16" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M324 310H362" stroke="#5f7fbd" stroke-width="6" stroke-linecap="round"/>
  <path d="M604 310H642" stroke="#5f7fbd" stroke-width="6" stroke-linecap="round"/>
  <path d="M884 310H922" stroke="#5f7fbd" stroke-width="6" stroke-linecap="round"/>

  <circle cx="343" cy="310" r="6" fill="#9ec6ff"/>
  <circle cx="623" cy="310" r="6" fill="#9ec6ff"/>
  <circle cx="903" cy="310" r="6" fill="#9ec6ff"/>
</svg>
