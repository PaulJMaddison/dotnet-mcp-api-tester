services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_strong_Passw0rd!}
    ports:
      - "14333:1433"
    ports:
      - "18082:8080"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 35s

  fixtureapi:
    build:
      context: .
      dockerfile: ApiTester.SmokeApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      E2E: "true"
    ports:
      - "18082:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  apitester-web:
    build:
      context: .
      dockerfile: ApiTester.Web/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
      fixtureapi:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      E2E: "true"
      Auth__ApiKeys__0: dev-local-key
      Persistence__Provider: SqlServer
      Persistence__ConnectionString: Server=sqlserver,1433;Database=ApiTester;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_Passw0rd!};Encrypt=False;TrustServerCertificate=True
    ports:
      - "18080:8080"
    ports:
      - "18082:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  apitester-site:
    build:
      context: .
      dockerfile: ApiTester.Site/Dockerfile
    depends_on:
      apitester-web:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8081
      E2E: "true"
      Auth__DevBypass: "true"
      ApiTesterWeb__BaseUrl: http://apitester-web:8080
      ApiTesterWeb__ApiKey: dev-local-key
      ConnectionStrings__LeadCapture: Data Source=/app/data/leads.db
      ConnectionStrings__Identity: Data Source=/app/data/identity.db
    ports:
      - "18081:8081"
    ports:
      - "18082:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
