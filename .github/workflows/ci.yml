name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.sln

      - name: Restore
        run: dotnet restore DotnetMcpApiTester.sln

      - name: Build
        run: dotnet build DotnetMcpApiTester.sln -c Release --no-restore

      - name: Test
        run: dotnet test DotnetMcpApiTester.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: artifacts/test-results/**/*.trx

      - name: Build Docker image (ApiTester.Web)
        run: docker build -f ApiTester.Web/Dockerfile -t apitester-web:ci .

      - name: Build Docker image (ApiTester.Site)
        run: docker build -f ApiTester.Site/Dockerfile -t apitester-site:ci .
