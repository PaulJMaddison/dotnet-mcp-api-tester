name: CI

on:
  workflow_dispatch:

jobs:
  release-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build (Release)
        run: dotnet build -c Release --no-restore
      - name: Test (Release)
        run: dotnet test -c Release --no-build --logger trx
      - name: Upload trx artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: '**/*.trx'
      - name: Docker build Web
        run: docker build -f ApiTester.Web/Dockerfile -t apitester-web:ci .
      - name: Docker build Site
        run: docker build -f ApiTester.Site/Dockerfile -t apitester-site:ci .
      - name: Docker build FixtureApi (if present)
        run: |
          if [ -f ApiTester.SmokeApi/Dockerfile ]; then
            docker build -f ApiTester.SmokeApi/Dockerfile -t apitester-smokeapi:ci .
          fi
