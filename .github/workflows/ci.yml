name: CI

on:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.sln

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-trx
          path: TestResults/**/*.trx

      - name: Build ApiTester.Web image
        run: docker build -f ApiTester.Web/Dockerfile -t apitester-web:ci .

      - name: Build ApiTester.Site image
        run: docker build -f ApiTester.Site/Dockerfile -t apitester-site:ci .
