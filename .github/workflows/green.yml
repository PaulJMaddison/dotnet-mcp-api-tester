name: Green Gate

on:
  workflow_dispatch:

jobs:
  green:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run green gate
        run: bash scripts/green.sh
